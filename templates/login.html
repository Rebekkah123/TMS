<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TMS Portal</title>
    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --primary-color: #2b5b31; /* Dark green matching image */
            --primary-hover: #1f4223;
            --input-bg: #ffffff;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --link-color: #334155;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h1 {
            margin: 0 0 0.5rem 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .card-header p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .forgot-link {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .forgot-link:hover {
            color: var(--text-main);
            text-decoration: underline;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(43, 91, 49, 0.1);
        }
        
        .form-control::placeholder {
            color: #a0aec0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            box-sizing: border-box;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 1.5rem 0;
        }

        .register-link-container {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .register-link-container a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
        }

        .register-link-container a:hover {
            text-decoration: underline;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.875rem;
            color: var(--text-muted);
            background-color: transparent;
        }
        
        .footer-logo {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.75rem;
            display: block;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 0.75rem;
        }

        .footer a:hover {
            color: var(--text-main);
        }

        .footer p {
            margin-top: 1rem;
            font-size: 0.8rem;
        }
    </style>
    <!-- Add Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="main-content">
        <div class="login-card">
            <div class="card-header">
                <h1>TMS Portal</h1>
                <p>Secure Employee Login</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label for="email">Official Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@tms.com" required>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
            </form>

            <div class="divider"></div>

            <div class="register-link-container">
                Need an account? <a href="/register/">Register</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <span class="footer-logo">TMS Portal</span>
        <div>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact Support</a>
        </div>
        <p>&copy; 2026 TMS Healthcare Systems. All rights reserved.</p>
    </footer>

</body>
</html>
